version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lexchile-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: lexchile
      POSTGRES_PASSWORD: lexchile123
      POSTGRES_DB: lexchile
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/database/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data:
